name: 🌽 AgroIA — Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # También puedes lanzarlo manualmente desde GitHub
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repo
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      # 2. Instalar Java 17 (requerido por Android)
      - name: ☕ Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3. Instalar Flutter estable
      - name: 🐦 Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      # 4. Verificar instalación
      - name: 🔍 Flutter doctor
        run: flutter doctor -v

      # 5. Instalar dependencias del proyecto
      - name: 📦 Instalar dependencias
        run: flutter pub get
        working-directory: agroia_flutter

      # 6. Analizar código (opcional, detecta errores)
      - name: 🔎 Analizar código
        run: flutter analyze --no-fatal-infos
        working-directory: agroia_flutter
        continue-on-error: true

      # 7. Compilar APK debug (sin firma — instala directamente)
      - name: 🔨 Compilar APK Debug
        run: flutter build apk --debug
        working-directory: agroia_flutter

      # 8. Compilar APK release (versión final)
      - name: 🏗️ Compilar APK Release
        run: flutter build apk --release --no-shrink
        working-directory: agroia_flutter

      # 9. Subir APK debug como artifact descargable
      - name: 📤 Subir APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: AgroIA-debug-apk
          path: agroia_flutter/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      # 10. Subir APK release como artifact descargable
      - name: 📤 Subir APK Release
        uses: actions/upload-artifact@v4
        with:
          name: AgroIA-release-apk
          path: agroia_flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # 11. Crear Release en GitHub con el APK
      - name: 🚀 Crear GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "agroia_flutter/build/app/outputs/flutter-apk/app-release.apk"
          tag: "v1.0.${{ github.run_number }}"
          name: "AgroIA v1.0.${{ github.run_number }}"
          body: |
            ## 🌽 AgroIA — Actualización automática
            
            **Cambios en este build:**
            ${{ github.event.head_commit.message }}
            
            **Para instalar:**
            1. Descarga el archivo `app-release.apk`
            2. En tu Android: Ajustes → Seguridad → Fuentes desconocidas ✅
            3. Abre el APK descargado e instala
            
            **Backend requerido:** Configura la URL del servidor en la app ⚙️
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
