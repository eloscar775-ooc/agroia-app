name: AgroIA Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Crear estructura Flutter completa
        run: |
          # Crear directorios necesarios
          mkdir -p lib/screens lib/widgets lib/services lib/providers
          mkdir -p android/app/src/main/kotlin/com/agroia/app
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/gradle/wrapper

          # Copiar archivos dart a sus ubicaciones correctas
          cp all_screens.dart lib/screens/all_screens.dart || true
          cp main.dart lib/main.dart || true
          cp api_service.dart lib/services/api_service.dart || true
          cp app_provider.dart lib/providers/app_provider.dart || true

          # Crear archivos de pantallas que reexportan
          echo "export 'all_screens.dart';" > lib/screens/dashboard_screen.dart
          echo "export 'all_screens.dart';" > lib/screens/parcelas_screen.dart
          echo "export 'all_screens.dart';" > lib/screens/diagnostico_screen.dart
          echo "export 'all_screens.dart';" > lib/screens/chat_screen.dart
          echo "export 'all_screens.dart';" > lib/screens/costos_screen.dart

          # Crear widgets
          cat > lib/widgets/stat_card.dart << 'DARTEOF'
          import 'package:flutter/material.dart';
          class StatCard extends StatelessWidget {
            final String icon, value, label;
            final Color color;
            const StatCard({super.key, required this.icon, required this.value, required this.label, required this.color});
            @override
            Widget build(BuildContext context) => Container(
              padding: const EdgeInsets.all(14),
              decoration: BoxDecoration(color: const Color(0xFF1A2A1E), borderRadius: BorderRadius.circular(12), border: Border.all(color: Colors.white.withOpacity(0.08))),
              child: Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
                Text(icon, style: const TextStyle(fontSize: 24)),
                const SizedBox(height: 6),
                Text(value, style: TextStyle(fontSize: 22, fontWeight: FontWeight.bold, color: color)),
                Text(label, style: const TextStyle(fontSize: 11, color: Color(0xFF9DBFA8))),
              ]),
            );
          }
          DARTEOF

          cat > lib/widgets/alerta_card.dart << 'DARTEOF'
          import 'package:flutter/material.dart';
          class AlertaCard extends StatelessWidget {
            final String nivel, icon, titulo, descripcion;
            const AlertaCard({super.key, required this.nivel, required this.icon, required this.titulo, required this.descripcion});
            @override
            Widget build(BuildContext context) {
              final color = nivel == 'critico' ? const Color(0xFFE74C3C) : nivel == 'advertencia' ? const Color(0xFFF0C040) : const Color(0xFF2ECC71);
              return Container(
                margin: const EdgeInsets.only(bottom: 8),
                padding: const EdgeInsets.all(12),
                decoration: BoxDecoration(color: const Color(0xFF1A2A1E), borderRadius: BorderRadius.circular(10), border: Border(left: BorderSide(color: color, width: 3))),
                child: Row(crossAxisAlignment: CrossAxisAlignment.start, children: [
                  Text(icon, style: const TextStyle(fontSize: 20)),
                  const SizedBox(width: 10),
                  Expanded(child: Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
                    Text(titulo, style: const TextStyle(fontSize: 13, fontWeight: FontWeight.bold, color: Color(0xFFE8F5EC))),
                    const SizedBox(height: 2),
                    Text(descripcion, style: const TextStyle(fontSize: 11, color: Color(0xFF9DBFA8))),
                  ])),
                ]),
              );
            }
          }
          DARTEOF

          cat > lib/widgets/clima_widget.dart << 'DARTEOF'
          import 'package:flutter/material.dart';
          class ClimaWidget extends StatelessWidget {
            final Map<String, dynamic> clima;
            const ClimaWidget({super.key, required this.clima});
            @override
            Widget build(BuildContext context) => Container(
              padding: const EdgeInsets.all(14),
              decoration: BoxDecoration(color: const Color(0xFF1A2A1E), borderRadius: BorderRadius.circular(12), border: Border.all(color: Colors.white.withOpacity(0.08))),
              child: Column(crossAxisAlignment: CrossAxisAlignment.start, children: [
                const Text('Clima Actual', style: TextStyle(fontSize: 14, fontWeight: FontWeight.bold, color: Color(0xFFE8F5EC))),
                const SizedBox(height: 12),
                Row(mainAxisAlignment: MainAxisAlignment.spaceAround, children: [
                  _SensorItem('${clima['temperatura_c'] ?? '--'}C', 'Temp.', const Color(0xFFFF7043)),
                  _SensorItem('${clima['humedad_pct'] ?? '--'}%', 'Humedad', const Color(0xFF29B6F6)),
                  _SensorItem('${clima['lluvia_mm'] ?? '0'}mm', 'Lluvia', const Color(0xFF7C4DFF)),
                  _SensorItem('${clima['viento_kmh'] ?? '--'}km/h', 'Viento', const Color(0xFF2ECC71)),
                ]),
              ]),
            );
          }
          class _SensorItem extends StatelessWidget {
            final String value, label;
            final Color color;
            const _SensorItem(this.value, this.label, this.color);
            @override
            Widget build(BuildContext context) => Column(children: [
              Text(value, style: TextStyle(fontSize: 13, fontWeight: FontWeight.bold, color: color)),
              Text(label, style: const TextStyle(fontSize: 10, color: Color(0xFF9DBFA8))),
            ]);
          }
          DARTEOF

      - name: Crear archivos Android necesarios
        run: |
          # build.gradle de la app
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.agroia.app"
              compileSdk 34
              ndkVersion "25.1.8937393"
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions {
                  jvmTarget = "1.8"
              }
              defaultConfig {
                  applicationId "com.agroia.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          flutter {
              source "../.."
          }
          EOF

          # build.gradle del proyecto raiz
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = "1.9.0"
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath "com.android.tools.build:gradle:8.1.4"
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = "../build"
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(":app")
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

          # settings.gradle
          cat > android/settings.gradle << 'EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()
              includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
          }
          include ":app"
          EOF

          # gradle-wrapper.properties
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-bin.zip
          EOF

          # local.properties
          FLUTTER_PATH=$(which flutter | sed 's|/bin/flutter||')
          echo "flutter.sdk=$FLUTTER_PATH" > android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

          # gradle.properties
          cat > android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # MainActivity.kt
          cat > android/app/src/main/kotlin/com/agroia/app/MainActivity.kt << 'EOF'
          package com.agroia.app
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity()
          EOF

          # strings.xml
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">AgroIA</string>
          </resources>
          EOF

          # styles.xml
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
              <style name="NormalTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
          </resources>
          EOF

          # Crear iconos placeholder (imagen PNG negra 1x1)
          python3 -c "
          import base64, os
          png_1x1 = base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==')
          dirs = ['mipmap-hdpi','mipmap-mdpi','mipmap-xhdpi','mipmap-xxhdpi','mipmap-xxxhdpi']
          for d in dirs:
              path = f'android/app/src/main/res/{d}/ic_launcher.png'
              os.makedirs(os.path.dirname(path), exist_ok=True)
              open(path,'wb').write(png_1x1)
          print('Iconos creados')
          "

      - name: Instalar dependencias Flutter
        run: flutter pub get

      - name: Compilar APK Debug
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Compilar APK Release
        run: flutter build apk --release --no-tree-shake-icons --no-shrink

      - name: Subir APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: AgroIA-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Subir APK Release
        uses: actions/upload-artifact@v4
        with:
          name: AgroIA-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Crear GitHub Release
        if: github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-release.apk"
          tag: "v1.0.${{ github.run_number }}"
          name: "AgroIA v1.0.${{ github.run_number }}"
          body: |
            AgroIA - Asistente Inteligente de Maiz

            Para instalar:
            1. Descarga app-release.apk
            2. En Android: Ajustes > Seguridad > Fuentes desconocidas ON
            3. Abre e instala el APK

            Luego en la app: Ajustes (icono engranaje) > pon la URL de tu servidor
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
