name: AgroIA Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          channel: stable
          cache: true

      - name: Crear local.properties
        run: |
          FSDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FSDK" > android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          cat android/local.properties

      - name: flutter pub get
        run: flutter pub get

      - name: Verificar archivos
        run: |
          find lib/ -name "*.dart" | sort
          find android/ -name "*.java" && echo "ERROR: hay java" || echo "Sin java OK"
          find android/ -name "*.kt" | sort

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - uses: actions/upload-artifact@v4
        with:
          name: AgroIA-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-release.apk"
          tag: "v1.0.${{ github.run_number }}"
          name: "AgroIA v1.0.${{ github.run_number }}"
          body: "Descarga app-release.apk e instalala. Activa Fuentes desconocidas en Ajustes de Android."
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
