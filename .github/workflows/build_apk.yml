name: AgroIA Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable
          cache: true

      - name: Crear local.properties
        run: |
          FSDK=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FSDK" > android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Limpiar java si existe
        run: rm -rf android/app/src/main/java || true

      - run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - uses: actions/upload-artifact@v4
        with:
          name: AgroIA-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-release.apk"
          tag: "v1.0.${{ github.run_number }}"
          name: "AgroIA v1.0.${{ github.run_number }}"
          body: "Descarga app-release.apk e instalala. Activa Fuentes desconocidas en Ajustes."
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
